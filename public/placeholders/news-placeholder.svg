<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Icon Container -->
  <g transform="translate(200, 150)">
    <!-- News icon - newspaper outline -->
    <rect x="-40" y="-30" width="80" height="60" rx="4" fill="none" stroke="#9ca3af" stroke-width="3"/>
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#9ca3af" stroke-width="2"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#9ca3af" stroke-width="2"/>
    <line x1="-30" y1="0" x2="10" y2="0" stroke="#9ca3af" stroke-width="2"/>
    <line x1="-30" y1="10" x2="10" y2="10" stroke="#9ca3af" stroke-width="2"/>
    <rect x="15" y="-5" width="15" height="20" fill="#d1d5db"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">News Placeholder</text>
</svg>
